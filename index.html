<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 class="title">JHS Portfolio</h1>
        
        <div class="portfolio-grid" id="portfolio-grid">
            </div>
    </div>

    <script>
        // 1. Replace this with your "Publish to Web" CSV link from Google Sheets
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqp9gms0RGShThKaCK-raQCbciyNSTi94uSthfKyZXeir3TZE9q4bXjp9i0S0vmZSkaiTdRkSEx9Xs/pub?gid=0&single=true&output=csv";

        async function loadDashboards() {
        const response = await fetch(sheetUrl);
        const csvData = await response.text();
        const rows = csvData.split('\n').slice(1);
        const grid = document.getElementById('portfolio-grid');

        grid.innerHTML = rows.map(row => {
            // Split by comma, but handle potential commas inside quotes
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
            if (cols.length < 6) return '';

            const [title, industry, desc, features, dashUrl, imgPath] = cols.map(c => c.replace(/"/g, '').trim());

            // Turn "Power BI | DAX" into individual <span> tags
            const featureTags = features.split('|').map(f => `<span>${f.trim()}</span>`).join('');

            return `
                <div class="portfolio-card">
                    <div class="card-header">
                        <span class="industry-badge">${industry}</span>
                        <div class="image-container">
                            <img src="${imgPath}" alt="${title}">
                        </div>
                    </div>
                    <div class="portfolio-info">
                        <h3>${title}</h3>
                        <p class="description">${desc}</p>
                        <div class="feature-tags">${featureTags}</div>
                        <hr>
                        <a href="${dashUrl}" target="_blank" class="view-link">View Details &rarr;</a>
                    </div>
                </div>
            `;
        }).join('');
    }
    loadDashboards();
    </script>

</body>
</html>
