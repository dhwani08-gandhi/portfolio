<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHS Analytics Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="page-header">
            <div class="eyebrow">⚡ Power BI Analytics</div>
            <h1 class="title">Featured Projects</h1>
            <div style="text-align:center; margin-bottom: 20px;">
                <span class="count-badge">Showing <span id="cs">0</span> of <span id="ct">0</span> projects</span>
            </div>
        </div>

        <div class="filters-bar" style="text-align:center; margin-bottom: 30px;">
            <span class="fl">Filter:</span>
            <button class="fb active" onclick="filter('All', this)">All</button>
        </div>

        <div class="portfolio-grid" id="portfolio-grid">
            </div>
    </div>

    <div class="ov" id="ov" onclick="closeMod(event)">
        <div class="modal">
            <div id="mimg"></div>
            <div class="mc" style="padding:20px;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <h2 id="mtitle" style="font-family:'Playfair Display', serif; margin-bottom:15px;"></h2>
                    <button onclick="closeMod()" style="cursor:pointer; background:none; border:none; font-size:1.5rem;">✕</button>
                </div>
                <p id="mdesc" style="color:#6B6B6B; line-height:1.6; margin-bottom:20px;"></p>
                <div style="font-weight:700; text-transform:uppercase; font-size:0.7rem; letter-spacing:1px; margin-bottom:10px;">Key Features</div>
                <ul id="mfeats" style="list-style:none; padding:0; margin-bottom:25px;"></ul>
                <div id="mtools"></div>
            </div>
        </div>
    </div>

    <script>
        const IC = {
            'Finance':        {bg:'#1A5C3A',lt:'#E8F5EE',tx:'#1A5C3A',ic:'💰'},
            'HR':             {bg:'#7C3AED',lt:'#F3EEFF',tx:'#7C3AED',ic:'👥'},
            'Supply Chain':   {bg:'#B45309',lt:'#FEF3E2',tx:'#B45309',ic:'🚛'},
            'Share Market':   {bg:'#1D4ED8',lt:'#EFF4FF',tx:'#1D4ED8',ic:'📈'},
            'Sales':          {bg:'#BE185D',lt:'#FDF0F6',tx:'#BE185D',ic:'🛒'},
            'Operations':     {bg:'#0F766E',lt:'#EDFAF8',tx:'#0F766E',ic:'⚙️'},
            'Procurement':    {bg:'#92400E',lt:'#FEF3E2',tx:'#92400E',ic:'📦'},
            'Reconciliation': {bg:'#374151',lt:'#F3F4F6',tx:'#374151',ic:'🔁'},
        };

        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqp9gms0RGShThKaCK-raQCbciyNSTi94uSthfKyZXeir3TZE9q4bXjp9i0S0vmZSkaiTdRkSEx9Xs/pub?gid=0&single=true&output=csv";
        let DATA = [];
        let AF = 'All';

        async function loadDataFromSheet() {
            try {
                const response = await fetch(sheetUrl);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1); 

                DATA = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 6) return null;

                    return {
                        title: cols[0].replace(/"/g, '').trim(),
                        industry: cols[1].replace(/"/g, '').trim(),
                        description: cols[2].replace(/"/g, '').trim(),
                        features: cols[3].replace(/"/g, '').split('|').map(f => f.trim()),
                        dashboardUrl: cols[4].replace(/"/g, '').trim(),
                        imageUrl: cols[5].replace(/"/g, '').trim()
                    };
                }).filter(p => p !== null);

                refresh();
            } catch (error) {
                console.error("Error loading sheet:", error);
            }
        }

        function gc(ind) {
            for (const [k, v] of Object.entries(IC)) 
                if (ind && ind.toLowerCase().includes(k.toLowerCase())) return v;
            return {bg:'#1E6FFF',lt:'#EEF3FF',tx:'#1E6FFF',ic:'📊'};
        }

        function buildFilters() {
            const bar = document.querySelector('.filters-bar');
            bar.querySelectorAll('.fb:not(:first-child)').forEach(b => b.remove());
            [...new Set(DATA.map(p => p.industry))].forEach(ind => {
                const b = document.createElement('button');
                b.className = 'fb'; b.textContent = ind;
                b.onclick = () => filter(ind, b); bar.appendChild(b);
            });
        }

        function filter(v, btn) {
            AF = v;
            document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(v === 'All' ? DATA : DATA.filter(p => p.industry === v));
        }

       function render(list) {
    document.getElementById('ct').textContent = DATA.length;
    document.getElementById('cs').textContent = list.length;
    const g = document.getElementById('portfolio-grid');
    
    if (!list.length) {
        g.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:80px;color:#6B6B6B">No projects found.</div>';
        return;
    }

    g.innerHTML = list.map((p, i) => {
        const ri = DATA.indexOf(p);
        const c = gc(p.industry);
        const hasImage = p.imageUrl && p.imageUrl.trim() !== '';
        
        // We use a single container for the image or the fallback
        // This ensures the content always fills the header area
        const mediaContent = hasImage 
            ? `<img src="${p.imageUrl}" alt="${p.title}" class="filled-image" onerror="this.parentElement.innerHTML='<div class=placeholder-fallback>${c.ic}</div>'">`
            : `<div class="placeholder-fallback" style="background:${c.bg}22">${c.ic}</div>`;

        const featureTags = p.features.slice(0, 3).map(f => `<span>${f}</span>`).join('');

        return `
            <div class="portfolio-card" style="animation: fadeInUp 0.4s ease forwards; animation-delay:${i * .06}s" onclick="openMod(${ri})">
                <div class="card-header">
                    <span class="industry-badge" style="background-color: ${c.bg}; z-index: 2;">${p.industry}</span>
                    <div class="image-container">
                        ${mediaContent}
                    </div>
                </div>
                <div class="portfolio-info">
                    <h3>${p.title}</h3>
                    <p class="description">${p.description}</p>
                    <div class="feature-tags">${featureTags}</div>
                    <hr>
                    <div class="view-link">View Details <span style="margin-left:5px">→</span></div>
                </div>
            </div>`;
    }).join('');
}
        function openMod(i) {
            const p = DATA[i], c = gc(p.industry);
            const hi = p.imageUrl && p.imageUrl.trim() !== '';
            
            document.getElementById('mimg').innerHTML = hi 
                ? `<img src="${p.imageUrl}" style="width:100%; height:250px; object-fit:cover; border-radius:18px 18px 0 0;" onerror="this.style.display='none'">` 
                : `<div style="height:200px; background:${c.lt}; display:flex; align-items:center; justify-content:center; font-size:4rem; border-radius:18px 18px 0 0;">${c.ic}</div>`;
                
            document.getElementById('mtitle').textContent = p.title;
            document.getElementById('mdesc').textContent = p.description;
            document.getElementById('mfeats').innerHTML = p.features.map(f => `
                <li style="margin-bottom:8px; font-size:0.9rem; color:#6B6B6B;">
                    <span style="color:${c.bg}; font-weight:700; margin-right:8px;">✓</span>${f}
                </li>`).join('');
            
            document.getElementById('mtools').innerHTML = `
                <a href="${p.dashboardUrl}" target="_blank" style="display:block; text-align:center; text-decoration:none; background:${c.bg}; color:white; padding:12px; border-radius:12px; font-weight:700;">
                    Open Live Dashboard ↗
                </a>
            `;

            document.getElementById('ov').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeMod(e) {
            if (e && e.type === 'click' && e.target.id !== 'ov') return;
            document.getElementById('ov').classList.remove('open');
            document.body.style.overflow = '';
        }

        function refresh() { 
            buildFilters(); 
            render(AF === 'All' ? DATA : DATA.filter(p => p.industry === AF)); 
        }

        loadDataFromSheet();
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMod(); });
    </script>
</body>
</html>
