<script>
    // 1. Industry Configuration
    const IC = {
        'Finance':       {bg:'#1A5C3A', lt:'#E8F5EE', tx:'#1A5C3A', ic:'💰'},
        'HR':            {bg:'#7C3AED', lt:'#F3EEFF', tx:'#7C3AED', ic:'👥'},
        'Supply Chain':  {bg:'#B45309', lt:'#FEF3E2', tx:'#B45309', ic:'🚛'},
        'Share Market':  {bg:'#1D4ED8', lt:'#EFF4FF', tx:'#1D4ED8', ic:'📈'},
        'Sales':         {bg:'#BE185D', lt:'#FDF0F6', tx:'#BE185D', ic:'🛒'},
        'Operations':    {bg:'#0F766E', lt:'#EDFAF8', tx:'#0F766E', ic:'⚙️'},
        'Procurement':   {bg:'#92400E', lt:'#FEF3E2', tx:'#92400E', ic:'📦'},
        'Reconciliation':{bg:'#374151', lt:'#F3F4F6', tx:'#374151', ic:'🔁'},
    };

    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqp9gms0RGShThKaCK-raQCbciyNSTi94uSthfKyZXeir3TZE9q4bXjp9i0S0vmZSkaiTdRkSEx9Xs/pub?gid=0&single=true&output=csv";
    let DATA = [];
    let AF = 'All';

    // 2. Data Loading with error handling
    async function loadDataFromSheet() {
        try {
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            
            // Basic CSV parser that handles quoted commas
            const rows = csvData.split('\n').slice(1); 
            DATA = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 6) return null;

                return {
                    title: cols[0].replace(/"/g, '').trim(),
                    industry: cols[1].replace(/"/g, '').trim(),
                    description: cols[2].replace(/"/g, '').trim(),
                    features: cols[3].replace(/"/g, '').split('|').map(f => f.trim()),
                    dashboardUrl: cols[4].replace(/"/g, '').trim(),
                    imageUrl: cols[5].replace(/"/g, '').trim()
                };
            }).filter(p => p !== null);

            refresh();
        } catch (error) {
            console.error("Critical Error: Could not load sheet data.", error);
        }
    }

    // 3. Helper to get industry styles
    function gc(ind) {
        for (const [k, v] of Object.entries(IC)) 
            if (ind && ind.toLowerCase().includes(k.toLowerCase())) return v;
        return {bg:'#1E6FFF', lt:'#EEF3FF', tx:'#1E6FFF', ic:'📊'};
    }

    // 4. Build Dynamic Filter Buttons
    function buildFilters() {
        const bar = document.getElementById('filters-container');
        if (!bar) return;

        // Keep only the "All" button (assumed to be the first one)
        const allBtn = bar.querySelector('.fb');
        bar.innerHTML = '';
        if (allBtn) bar.appendChild(allBtn);
        
        const industries = [...new Set(DATA.map(p => p.industry))];
        industries.forEach(ind => {
            const b = document.createElement('button');
            b.className = 'fb'; 
            b.textContent = ind;
            b.onclick = (e) => filter(ind, e.target); 
            bar.appendChild(b);
        });
    }

    function filter(v, btn) {
        AF = v;
        document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(v === 'All' ? DATA : DATA.filter(p => p.industry === v));
    }

    // 5. Core Render Function (Direct Redirect)
    function render(list) {
        const ct = document.getElementById('ct');
        const cs = document.getElementById('cs');
        if (ct) ct.textContent = DATA.length;
        if (cs) cs.textContent = list.length;

        const g = document.getElementById('portfolio-grid');
        if (!g) return;
        
        if (!list.length) {
            g.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:80px;color:#6B7280">No projects found for this category.</div>';
            return;
        }

        g.innerHTML = list.map((p, i) => {
            const c = gc(p.industry);
            const hasImage = p.imageUrl && p.imageUrl.trim() !== '';
            
            // Image fallback logic
            const mediaContent = hasImage 
                ? `<img src="${p.imageUrl}" alt="${p.title}" class="filled-image" onerror="this.parentElement.innerHTML='<div style=\'width:100%;height:100%;background:${c.bg}15\'></div>'">`
                : `<div style="width:100%; height:100%; background:${c.bg}15;"></div>`;

            return `
                <div class="portfolio-card" 
                     style="animation: fadeInUp 0.5s ease forwards; animation-delay: ${i * 0.05}s; opacity: 0;" 
                     onclick="window.open('${p.dashboardUrl}', '_blank')">
                    <div class="card-header">
                        <span class="industry-badge" style="background-color: ${c.bg};">${p.industry}</span>
                        <div class="image-container">
                            ${mediaContent}
                        </div>
                    </div>
                    <div class="portfolio-info">
                        <h3>${p.title}</h3>
                        <p class="description">${p.description}</p>
                        <div class="feature-tags">
                            ${p.features.slice(0, 2).map(f => `<span>${f}</span>`).join('')}
                        </div>
                        <div class="view-link">Open Dashboard ↗</div>
                    </div>
                </div>`;
        }).join('');
    }

    function refresh() { 
        buildFilters(); 
        render(AF === 'All' ? DATA : DATA.filter(p => p.industry === AF)); 
    }

    // 6. Initialization
    loadDataFromSheet();

    // Removed openMod and closeMod as the whole card is now a direct link.
</script>
